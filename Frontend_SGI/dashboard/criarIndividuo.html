<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>SGI | Novo Indivíduo</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        .card { padding: 40px; }
        .tabs { display: flex; gap: 10px; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; padding-bottom: 10px; }
        .tab-btn { background: transparent; border: none; color: var(--text-secondary); padding: 12px 24px; cursor: pointer; font-size: 0.95rem; font-weight: 600; border-radius: 6px; text-transform: uppercase; transition: 0.3s; }
        .tab-btn:hover { background-color: rgba(255,255,255,0.05); color: white; }
        .tab-btn.active { background-color: var(--accent-blue); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .form-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 25px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .col-12 { grid-column: span 12; } .col-8 { grid-column: span 8; } .col-6 { grid-column: span 6; } .col-4 { grid-column: span 4; } .col-3 { grid-column: span 3; }
        label { font-size: 0.85rem; color: var(--accent-blue); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 2px; }
        input, select { padding: 12px 15px; background-color: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; font-size: 1rem; transition: border-color 0.3s; }
        input:focus, select:focus { outline: none; border-color: var(--accent-blue); }
        
        .lista-container { background-color: rgba(0,0,0,0.2); border-radius: 8px; padding: 20px; border: 1px dashed var(--border-color); min-height: 50px; }
        .item-row { display: grid; grid-template-columns: 1fr 1fr 1fr 50px; gap: 15px; align-items: end; background-color: var(--bg-panel); padding: 15px; border-radius: 6px; border: 1px solid var(--border-color); margin-bottom: 10px; }
        .crime-row { grid-template-columns: 1fr 50px; } /* Linha mais simples para crimes */
        .banco-row { grid-template-columns: 1fr 2fr 50px; }
        
        .btn-add { background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; color: #10b981; padding: 10px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 5px; }
        .btn-remove { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; width: 100%; height: 45px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .tab-content { display: none; } .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container"><img src="img/logo.png" class="logo-img"></div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg><span>Dashboard Geral</span></a>
            <a href="tblEmpresa.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l8-4 8 4v14M8 21v-2a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg><span>Organizações</span></a>
            <a href="tblIndividuo.html" class="nav-item active"><svg class="nav-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>Suspeitos / Civis</span></a>
        </nav>
        <div class="nav-footer"><button onclick="logout()" class="btn-logout"><svg class="nav-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg><span>Terminar Sessão</span></button></div>
    </div>

    <div class="main-content">
        <div class="header-section"><h1 class="page-title">Fichar Novo Suspeito</h1></div>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="openTab('geral')">1. Dados Pessoais</button>
                <button class="tab-btn" onclick="openTab('crimes')">2. Status & Crimes</button> <button class="tab-btn" onclick="openTab('veiculos')">3. Veículos</button>
                <button class="tab-btn" onclick="openTab('bancos')">4. Bancos</button>
            </div>

            <form id="formCriar">
                <div id="geral" class="tab-content active">
                    <div class="form-grid">
                        <div class="form-group col-6"><label>Nome Completo *</label><input type="text" id="nome" required></div>
                        <div class="form-group col-3"><label>NIF / ID Civil *</label><input type="text" id="nif" required></div>
                        <div class="form-group col-3"><label>Data Nascimento</label><input type="date" id="dataNascimento" style="color-scheme: dark;"></div>
                        <div class="form-group col-4"><label>Nacionalidade</label><input type="text" id="nacionalidade"></div>
                        <div class="form-group col-4"><label>Profissão</label><input type="text" id="profissao"></div>
                        <div class="form-group col-4"><label>Telefone</label><input type="text" id="telefone"></div>
                        <div class="form-group col-12"><label>Morada Completa</label><input type="text" id="morada"></div>
                        
                        <div class="form-group col-12" style="border: 1px dashed #334155; padding: 20px; border-radius: 8px;">
                            <label>Fotografia de Identificação</label>
                            <div style="display: flex; gap: 20px; align-items: center;">
                                <input type="file" id="fotoInput" accept="image/*" onchange="previewImage(this)">
                                <img id="imgPreview" src="img/user.png" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid var(--accent-blue);">
                            </div>
                        </div>
                    </div>
                </div>

                <div id="crimes" class="tab-content">
                    <div class="form-grid">
                        <div class="form-group col-12">
                            <label>Status Operacional Atual</label>
                            <select id="statusOperacional" style="background-color: #1e293b; color: #fff; border: 1px solid var(--accent-blue);">
                                <option value="Livre">Livre</option>
                                <option value="Sob Vigilância">Sob Vigilância</option>
                                <option value="Procurado">Procurado</option>
                                <option value="Detido">Detido</option>
                                <option value="Desaparecido">Desaparecido</option>
                                <option value="Óbito">Óbito</option>
                            </select>
                        </div>
                    </div>

                    <div style="margin-top: 20px;">
                        <label style="display:block; margin-bottom: 10px;">Registo Criminal (Adicionar Crimes)</label>
                        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                            <select id="crimeSelector" style="flex: 1;">
                                <option value="">-- Selecionar Crime --</option>
                                <option>Homicídio</option>
                                <option>Homicídio Qualificado</option>
                                <option>Roubo</option>
                                <option>Furto Qualificado</option>
                                <option>Tráfico de Estupefacientes</option>
                                <option>Ofensa à Integridade Física</option>
                                <option>Violência Doméstica</option>
                                <option>Burla / Fraude</option>
                                <option>Condução Ilegal</option>
                                <option>Posse de Arma Proibida</option>
                            </select>
                            <button type="button" class="btn-add" onclick="addCrime()" style="margin-bottom:0;">+ Adicionar</button>
                        </div>
                        <div id="lista-crimes" class="lista-container"></div>
                    </div>
                </div>

                <div id="veiculos" class="tab-content">
                    <button type="button" class="btn-add" onclick="addVeiculo()">+ Associar Viatura</button>
                    <div id="lista-veiculos" class="lista-container"></div>
                </div>

                <div id="bancos" class="tab-content">
                    <button type="button" class="btn-add" onclick="addBanco()">+ Associar Conta</button>
                    <div id="lista-bancos" class="lista-container"></div>
                </div>

                <div style="margin-top: 40px; text-align: right;">
                    <button type="submit" class="btn-action" style="padding: 15px 40px;">Criar Ficha</button>
                </div>
            </form>
        </div>
    </div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
  const APIURL = "https://projetopciii-secred2.onrender.com/api";

  if (!localStorage.getItem("token")) {
    window.location.href = "login.html";
  }

  $("#agenteNome").text(localStorage.getItem("userNome"));

  function logout() {
    localStorage.clear();
    window.location.href = "login.html";
  }

  function openTab(tabId) {
    $(".tab-content").removeClass("active");
    $(".tab-btn").removeClass("active");
    $(tabId).addClass("active");
    event.target.classList.add("active");
  }

  function previewImage(input) {
    if (input.files && input.files[0]) {
      const r = new FileReader();
      r.onload = function (e) {
        $("#imgPreview").attr("src", e.target.result);
      };
      r.readAsDataURL(input.files[0]);
    }
  }

  function addVeiculo() {
    $("#lista-veiculos").append(`
      <div class="item-row">
        <div>
          <label>Matrícula</label>
          <input type="text" class="v-mat">
        </div>
        <div>
          <label>Marca</label>
          <input type="text" class="v-marca">
        </div>
        <div>
          <label>Modelo</label>
          <input type="text" class="v-modelo">
        </div>
        <div>
          <button type="button" class="btn-remove" onclick="this.closest('.item-row').remove()">X</button>
        </div>
      </div>
    `);
  }

  function addBanco() {
    $("#lista-bancos").append(`
      <div class="item-row banco-row">
        <div>
          <label>Banco</label>
          <input type="text" class="b-nome">
        </div>
        <div>
          <label>IBAN</label>
          <input type="text" class="b-iban">
        </div>
        <div>
          <button type="button" class="btn-remove" onclick="this.closest('.item-row').remove()">X</button>
        </div>
      </div>
    `);
  }

  function addCrime() {
    const crime = $("#crimeSelector").val();
    if (!crime) return;

    $("#lista-crimes").append(`
      <div class="item-row crime-row">
        <input type="text" class="c-nome" value="${crime}" readonly
          style="background:#1e293b;border:none;color:white;">
        <div>
          <button type="button" class="btn-remove" onclick="this.closest('.item-row').remove()">X</button>
        </div>
      </div>
    `);

    $("#crimeSelector").val("");
  }

  $("#formCriar").on("submit", function (e) {
    e.preventDefault();

    const token = localStorage.getItem("token");
    const formData = new FormData();

    formData.append("nome", $("#nome").val());
    formData.append("nif", $("#nif").val());
    formData.append("dataNascimento", $("#dataNascimento").val());
    formData.append("nacionalidade", $("#nacionalidade").val());
    formData.append("profissao", $("#profissao").val());
    formData.append("morada", $("#morada").val());
    formData.append("telefone", $("#telefone").val());
    formData.append("statusOperacional", $("#statusOperacional").val());

    const fileInput = $("#fotoInput")[0];
    if (fileInput.files[0]) {
      formData.append("foto", fileInput.files[0]);
    }

    const veiculos = [];
    $("#lista-veiculos .item-row").has(".v-mat").each(function () {
      veiculos.push({
        matricula: $(this).find(".v-mat").val(),
        marca: $(this).find(".v-marca").val(),
        modelo: $(this).find(".v-modelo").val(),
      });
    });
    formData.append("veiculos", JSON.stringify(veiculos));

    const contas = [];
    $("#lista-bancos .item-row").has(".b-nome").each(function () {
      contas.push({
        banco: $(this).find(".b-nome").val(),
        iban: $(this).find(".b-iban").val(),
      });
    });
    formData.append("contasBancarias", JSON.stringify(contas));

    const crimes = [];
    $("#lista-crimes .c-nome").each(function () {
      crimes.push($(this).val());
    });
    formData.append("crimes", JSON.stringify(crimes));

    $.ajax({
      url: APIURL + "/individuos",
      method: "POST",
      headers: { "auth-token": token },
      data: formData,
      processData: false,
      contentType: false,
      success: function () {
        alert("Sucesso!");
        window.location.href = "tblIndividuo.html";
      },
      error: function (xhr) {
        alert("Erro: " + (xhr.responseText || "Falha ao criar suspeito"));
      },
    });
  });
</script>

</body>
</html>
